<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrador | POLLAZO BET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260703-manual-winner" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <h1>ADMIN POLLAZO BET</h1>
        <p>Panel privado para registrar ganadores de apuestas cerradas</p>
      </section>

      <section class="card">
        <h2>Acceso del administrador</h2>
        <div id="admin-login" class="admin-login">
          <input id="admin-code-input" type="password" placeholder="Clave de administrador" autocomplete="off" />
          <button id="admin-login-btn" type="button">Entrar</button>
        </div>
        <p id="result-message"></p>
      </section>

      <section class="card">
        <h2>Crear jugador autorizado</h2>
        <form id="admin-user-form" style="display:none;">
          <label>
            Nombre real
            <input id="admin-user-name" type="text" maxlength="20" placeholder="Nombre del jugador" required />
          </label>
          <label>
            PIN de 4 numeros
            <input id="admin-user-pin" type="password" maxlength="4" inputmode="numeric" placeholder="PIN" required />
          </label>
          <button id="save-user-btn" type="submit">Guardar jugador</button>
        </form>
        <p id="admin-user-message"></p>
      </section>

      <section class="card">
        <h2>Solicitudes de PIN</h2>
        <ul id="pin-requests-list"></ul>
      </section>

      <section class="card">
        <h2>Control de apuestas</h2>
        <button id="auto-results-btn" type="button" style="display:none;">Actualizar ganadores automaticos</button>
        <button id="reset-bets-btn" type="button" style="display:none;">Limpiar apuestas manualmente</button>
        <p id="reset-bets-message"></p>
      </section>

      <section class="card">
        <h2>Historial de apuestas aceptadas</h2>
        <ul id="bet-history-list"></ul>
      </section>

      <section class="card">
        <h2>Registrar ganador</h2>
        <form id="result-form" style="display:none;">
          <label>
            Apuesta cerrada
            <select id="winner-bet-select" name="winnerKey" required>
              <option value="">Selecciona una apuesta cerrada...</option>
            </select>
          </label>
          <label>
            Ganador
            <select id="winner-name-select" name="winnerName" required>
              <option value="">Selecciona el ganador...</option>
            </select>
          </label>
          <button id="save-result-btn" type="submit">Guardar ganador</button>
        </form>
        <form id="manual-winner-form" style="display:none;">
          <label>
            Ganador
            <input id="manual-winner-name" type="text" maxlength="40" placeholder="Nombre del ganador" required />
          </label>
          <label>
            Partido
            <input id="manual-winner-match" type="text" maxlength="80" placeholder="Ejemplo: Ecuador vs Brasil" required />
          </label>
          <label>
            Apuesta
            <input id="manual-winner-bet" type="text" maxlength="120" placeholder="Ejemplo: Juan vs Pedro" required />
          </label>
          <label>
            Apuesta
            <select id="manual-winner-amount" required>
              <option value="1" selected>Cuarto de Pollo</option>
            </select>
          </label>
          <button id="save-manual-winner-btn" type="submit">Guardar ganador manual</button>
        </form>
      </section>

      <section class="card">
        <h2>Ganadores registrados</h2>
        <ul id="winners-list"></ul>
      </section>
    </main>

    <script src="/admin.js?v=20260709-cuarto-pollo"></script>
  </body>
</html>
